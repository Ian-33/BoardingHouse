<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;500;700&display=swap">
        <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto:400,400i,700&display=swap">
        <title> Options </title>
        <style> 

body {
    margin: 0px;
    background-image: url(MainBG.jpg);
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    position: relative;
}

body::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0, 0, 0, 0.5);
    z-index: -1;
}

nav {
    background: transparent;
    backdrop-filter: blur(1px);
    padding: 20px 12px;
    
}

.Nav-container {
    display: inline-block;
}

.Web-title {
    font-size: 26px;
    font-family: 'Raleway', sans-serif;
    color: white;
    display: inline-block;
    margin: 0;
    position: relative;
    top: -10px;
    left: 15px;
}

.Orange {
    color: #FFAC1C;
    margin-right: 6px;
}

.Links-container {
    float: right;
    position: relative;
    top: 10px;
    margin-right: 18px;
}

.Link {
    font-size: 20px;
    font-weight: 600;
    color: white;
    font-family: 'Raleway', sans-serif;
    text-decoration: none;
    transition: 0.6s;
    border: none;
    margin-left: 8px;
    margin-right: 8px;
    padding: 10px 7px 5px 7px;
    background-color: transparent;
    border-radius: 0;
    cursor: pointer;
}

        section {
            max-width: 350px;
            margin: 20px auto;
            margin-bottom: 300px;
            padding-top: 20px;
            padding-bottom: 50px;
            padding-left: 20px;
            padding-right: 20px;
            box-shadow: 0 0 28px rgba(0, 0, 0, 0.1);
            border: 2px solid white;
            text-align: center;
        }

        h2 {
            color: white;
            text-align: center;
            font-family: 'Raleway', sans-serif;
            
        }

        h1 {
            font-family: 'Raleway', sans-serif;
        }

        .Text1 {
            font-size: 20px;
            font-family: 'Roboto', sans-serif;
        }

        .Text2 {
            font-family: 'Roboto', sans-serif;
        }

        .dropdown {
            position: relative;
            display: inline-block;
        }

        .dropdown button {
            color: white;
            padding: 10px;
            font-size: 20px;
            border: none;
            background: transparent;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
            border: none;
            text-decoration: underline;
        }

        .dropdown button:hover {
            color: gray;
        }

        .dropdown-content {
           display: none;
           position: absolute;
           border: 2px solid white;
            background: transparent;
          
           box-shadow: 0 8px 16px rgba(0,0,0,0.2);
           z-index: 1;
        }

        .dropdown-content a {
           color: white;
           padding: 12px 16px;
           text-decoration: none;
           display: block;
        }

        .dropdown-content a:hover {
           background-color: #ddd;
        }

        .dropdown:hover .dropdown-content {
           display: block;
        }

        footer {
            border-top: 3px solid #9a8369;
            background-image: url(WoodBG.jpg);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            color: black;
            font-family: 'Raleway', sans-serif;
            text-align: center;
            padding: 1em 0;
            bottom: 0;
            width: 100%;
            font-weight: 550;
        }

        .footer-title {
            font-size: 18px;
        }
        </style>
    </head>
    <body>
        <nav>
            <div class="Nav-container">
                <img src="House_icon.png" width="50px" height="50px"/>
                <h2 class="Web-title"> <span class="Orange">Website</span>Prototype </h2>
            </div>
            <div class="Links-container">
               <button class="Link" onclick="window.location.href='index.html'"> Home </button>
               <button class="Link" onclick="window.location.href='FAQpage.html'"> FAQ </button>
               <button class="Link" onclick="window.location.href='Feedbackpage.html'"> Feedback </button>
               <button class="Link" onclick="window.location.href='AboutUs.html'"> About us </button>
            </div>
        </nav>
        <br>
        <br>
        <br>
        <br>
        <section>
            <h2> Choices </h2>
            <div class="dropdown">
                <button class="Text1"> Barangay Silanga </button>
                <div class="dropdown-content">
                  <a class="Text2" href="#"> Purok 1 </a>
                  <a class="Text2" href="#"> Purok 2 </a>
                  <a class="Text2" href="Purok3.html"> Purok 3 </a>
                  <a class="Text2" href="#"> Purok 4 </a>
                  <a class="Text2" href="Purok5.html"> Purok 5 </a>
                  <a class="Text2" href="#"> Purok 6 </a>
                  <a class="Text2" href="#"> Purok 7 </a>
                </div>
              </div>
        </section>
        <footer>
            <p class="footer-title">&copy; 2023 House Boarding Rentals. All rights reserved.</p>
        </footer>
    </body>
</html>
